services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.fe
    environment:
      - BACKEND_URL=backend:3000
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.be
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_DIR=/app/data
