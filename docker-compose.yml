services:
  todos-frontend:
    build:
      context: .
      dockerfile: Dockerfile.fe
    environment:
      - BACKEND_URL=http://todos-backend:3000
    ports:
      - "127.0.0.1:4011:80"
      - "127.0.0.1:4012:81"
    depends_on:
      - todos-backend
    networks:
      - todos

  todos-backend:
    build:
      context: .
      dockerfile: Dockerfile.be
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_DIR=/app/data
    networks:
      - todos

  ts-shared-todos:
    image: tailscale/tailscale:latest
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--login-server https://sharedscale.mtib.dev
    volumes:
      - .ts/shared-todos:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    network_mode: "service:todos-frontend"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

networks:
  todos:
    driver: bridge
